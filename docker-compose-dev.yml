    environment:
      PORT: 5000
      MONGO_URI: mongodb://localhost:27017/student_management
      JWT_SECRET: d2171496a4f257f1dd237ed4ba15a3d80f2f499a2db2ffcce803d38212925e85fc984adf1baf84207716325fafd980e8325e11da5832020d209c8abea0caff70

    # depends_on:
