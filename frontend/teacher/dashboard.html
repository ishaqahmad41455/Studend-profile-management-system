<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Teacher Dashboard | SMS</title>
  <link rel="stylesheet" href="../assets/css/style.css" />
</head>
<body>
  <div class="app-wrapper">
    <!-- Sidebar – teacher navigation -->
    <aside class="sidebar">
      <div class="sidebar-logo">
        <div class="sidebar-logo-icon">S</div>
        <div class="sidebar-logo-text">SMS Platform <span>Teacher Panel</span></div>
      </div>
      <nav class="sidebar-nav">
        <div class="nav-section-title">Main</div>
        <a href="dashboard.html" class="nav-link active">
          <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/></svg>
          Dashboard
        </a>
        <div class="nav-section-title">Teaching</div>
        <a href="mark-attendance.html" class="nav-link">
          <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M9 5H7a2 2 0 0 0-2 2v12a2 2 0 0 0 2 2h10a2 2 0 0 0 2-2V7a2 2 0 0 0-2-2h-2M9 5a2 2 0 0 1 2-2h2a2 2 0 0 1 2 2v0a2 2 0 0 1-2 2h-2a2 2 0 0 1-2-2z"/></svg>
          Mark Attendance
        </a>
        <div class="nav-section-title">Reports</div>
        <a href="../reports/monthly-report.html" class="nav-link">
          <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><line x1="18" y1="20" x2="18" y2="10"/><line x1="12" y1="20" x2="12" y2="4"/><line x1="6" y1="20" x2="6" y2="14"/></svg>
          Monthly Report
        </a>
      </nav>
      <div class="sidebar-footer">
        <div class="sidebar-user">
          <div class="sidebar-user-avatar" id="sidebar-avatar">T</div>
          <div class="sidebar-user-info">
            <div class="sidebar-user-name" id="sidebar-user-name">Teacher</div>
            <div class="sidebar-user-role">teacher</div>
          </div>
          <button class="btn-logout" onclick="logout()" title="Logout">
            <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
          </button>
        </div>
      </div>
    </aside>

    <!-- Main Content -->
    <div class="main-content">
      <header class="top-header">
        <div>
          <div class="header-title">Teacher Dashboard</div>
          <div class="header-subtitle" id="welcomeMessage">Welcome back!</div>
        </div>
        <div class="header-actions">
          <div class="sidebar-user-avatar" id="header-avatar" style="width: 34px; height: 34px; background: var(--primary); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 13px; font-weight: 700; color: #fff; margin-right: 8px;">T</div>
          <span id="header-display-name" style="font-weight: 600;">Teacher Name</span>
        </div>
      </header>

      <div class="page-content">
        <div id="alertContainer"></div>

        <!-- Stats Grid -->
        <div class="stats-grid">
          <div class="stat-card">
            <div class="stat-icon blue">
              <svg width="22" height="22" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><rect x="2" y="3" width="20" height="14" rx="2"/><path d="M8 21h8M12 17v4"/></svg>
            </div>
            <div>
              <div class="stat-value" id="totalClasses">-</div>
              <div class="stat-label">Classes</div>
            </div>
          </div>
          <div class="stat-card">
            <div class="stat-icon green">
              <svg width="22" height="22" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"/><path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"/></svg>
            </div>
            <div>
              <div class="stat-value" id="totalSubjects">-</div>
              <div class="stat-label">Subjects</div>
            </div>
          </div>
          <div class="stat-card">
            <div class="stat-icon amber">
              <svg width="22" height="22" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>
            </div>
            <div>
              <div class="stat-value" id="totalStudents">-</div>
              <div class="stat-label">Students</div>
            </div>
          </div>
          <div class="stat-card">
            <div class="stat-icon red">
              <svg width="22" height="22" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M9 5H7a2 2 0 0 0-2 2v12a2 2 0 0 0 2 2h10a2 2 0 0 0 2-2V7a2 2 0 0 0-2-2h-2M9 5a2 2 0 0 1 2-2h2a2 2 0 0 1 2 2v0a2 2 0 0 1-2 2h-2a2 2 0 0 1-2-2z"/></svg>
            </div>
            <div>
              <div class="stat-value" id="todayAttendance">-</div>
              <div class="stat-label">Attendance Today</div>
            </div>
          </div>
        </div>

        <!-- Quick Actions Card -->
        <div class="card">
          <div class="card-header">
            <div>
              <div class="card-title">Quick Actions</div>
              <div class="card-subtitle">Common tasks for teachers</div>
            </div>
          </div>
          <div style="display: flex; gap: 1rem; flex-wrap: wrap;">
            <a href="mark-attendance.html" class="btn btn-primary">
              <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><path d="M12 20h9"/><path d="M16.5 3.5a2.121 2.121 0 0 1 3 3L7 19l-4 1 1-4L16.5 3.5z"/></svg>
              Mark Attendance
            </a>
            <a href="../reports/monthly-report.html" class="btn btn-secondary">
              <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><line x1="18" y1="20" x2="18" y2="10"/><line x1="12" y1="20" x2="12" y2="4"/><line x1="6" y1="20" x2="6" y2="14"/></svg>
              View Reports
            </a>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script src="../assets/js/api.js"></script>
  <script>
    const api = API;

    // Populate sidebar and header with teacher info
    (function () {
      const user = getUser();
      if (user) {
        document.getElementById('sidebar-user-name').textContent = user.name || 'Teacher';
        document.getElementById('sidebar-avatar').textContent = (user.name || 'T').charAt(0).toUpperCase();
        document.getElementById('welcomeMessage').textContent = `Welcome back, ${user.name || 'Teacher'}!`;
        document.getElementById('header-display-name').textContent = user.name || 'Teacher Name';
        document.getElementById('header-avatar').textContent = (user.name || 'T').charAt(0).toUpperCase();
      }
    })();

    async function loadTeacherDashboard() {
      try {
        const [classesRes, subjectsRes, studentsRes] = await Promise.all([
          api.getClasses(),
          api.getSubjects(),
          api.getStudents()
        ]);

        if (classesRes.success) {
          document.getElementById('totalClasses').textContent = classesRes.data?.length || 0;
        }
        if (subjectsRes.success) {
          document.getElementById('totalSubjects').textContent = subjectsRes.data?.length || 0;
        }
        if (studentsRes.success) {
          document.getElementById('totalStudents').textContent = studentsRes.data?.length || 0;
        }

        // Today's attendance count (simplified – adjust if needed)
        const today = new Date().toISOString().split('T')[0];
        const attRes = await api.getAttendance(`?date=${today}`);
        if (attRes.success) {
          document.getElementById('todayAttendance').textContent = attRes.data?.length || 0;
        }
      } catch (error) {
        console.error('Dashboard error:', error);
        showAlert('Unable to load dashboard data', 'danger', document.getElementById('alertContainer'));
      }
    }

    loadTeacherDashboard();
  </script>
</body>
</html>
