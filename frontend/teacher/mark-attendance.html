<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mark Attendance - Teacher</title>
    <link rel="stylesheet" href="../assets/css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>
    <div class="dashboard-container">
        <aside class="sidebar">
            <div class="sidebar-header">
                <h3><i class="fas fa-graduation-cap"></i> EduManage</h3>
            </div>
            <ul class="sidebar-menu">
                <li><a href="dashboard.html"><i class="fas fa-home"></i> Dashboard</a></li>
                <li><a href="mark-attendance.html" class="active"><i class="fas fa-pencil-alt"></i> Mark Attendance</a></li>
                <li><a href="#" onclick="auth.logout()"><i class="fas fa-sign-out-alt"></i> Logout</a></li>
            </ul>
        </aside>

        <main class="main-content">
            <div class="dashboard-header">
                <div>
                    <h2>Mark Attendance</h2>
                    <p style="color: var(--gray-color);">Record student attendance by class and subject</p>
                </div>
            </div>

            <div style="display: grid; grid-template-columns: repeat(auto-fit, minmax(240px, 1fr)); gap: 1rem; margin-bottom: 1.5rem;">
                <div class="form-group">
                    <label for="attendanceClass">Class</label>
                    <select id="attendanceClass" class="form-control" onchange="loadStudentsForClass()">
                        <option value="">Select Class</option>
                    </select>
                </div>
                <div class="form-group">
                    <label for="attendanceSubject">Subject</label>
                    <select id="attendanceSubject" class="form-control">
                        <option value="">Select Subject</option>
                    </select>
                </div>
                <div class="form-group">
                    <label for="attendanceDate">Date</label>
                    <input type="date" id="attendanceDate" class="form-control" value="" />
                </div>
            </div>

            <div class="table-container">
                <div class="table-header">
                    <h3>Students</h3>
                </div>
                <div class="table-responsive">
                    <table>
                        <thead>
                            <tr>
                                <th>#</th>
                                <th>Name</th>
                                <th>Roll Number</th>
                                <th>Status</th>
                                <th>Remarks</th>
                            </tr>
                        </thead>
                        <tbody id="attendanceStudentBody">
                            <tr><td colspan="5"><div class="spinner"></div></td></tr>
                        </tbody>
                    </table>
                </div>
            </div>

            <button class="btn btn-primary" onclick="submitAttendance()" style="margin-top: 1rem;">
                <i class="fas fa-save"></i> Submit Attendance
            </button>
        </main>
    </div>

    <script src="../assets/js/api.js"></script>
    <script>
        let attendanceStudents = [];
        let subjects = [];

        async function loadInitialAttendanceData() {
            try {
                const [classesRes, subjectsRes] = await Promise.all([
                    api.get('/classes'),
                    api.get('/subjects')
                ]);

                if (classesRes.success) {
                    const classSelect = document.getElementById('attendanceClass');
                    classSelect.innerHTML = '<option value="">Select Class</option>' + classesRes.data.map(cls => `
                        <option value="${cls._id}">${cls.name}${cls.section ? ' ' + cls.section : ''}</option>`).join('');
                }
                if (subjectsRes.success) {
                    subjects = subjectsRes.data;
                    const subjectSelect = document.getElementById('attendanceSubject');
                    subjectSelect.innerHTML = '<option value="">Select Subject</option>' + subjects.map(subject => `
                        <option value="${subject._id}">${subject.name} (${subject.code})</option>`).join('');
                }
                document.getElementById('attendanceDate').value = new Date().toISOString().split('T')[0];
            } catch (error) {
                console.error('Load attendance data error', error);
                showToast('Unable to load attendance data', 'error');
            }
        }

        async function loadStudentsForClass() {
            const classId = document.getElementById('attendanceClass').value;
            if (!classId) {
                document.getElementById('attendanceStudentBody').innerHTML = '<tr><td colspan="5" class="text-center">Select a class to load students.</td></tr>';
                return;
            }

            const tbody = document.getElementById('attendanceStudentBody');
            tbody.innerHTML = '<tr><td colspan="5"><div class="spinner"></div></td></tr>';

            try {
                const response = await api.get(`/students?classId=${classId}`);
                if (response.success) {
                    attendanceStudents = response.data.map((student, index) => ({
                        ...student,
                        status: 'present',
                        remarks: ''
                    }));
                    renderStudentAttendance(attendanceStudents);
                } else {
                    showToast(response.message || 'Unable to load students', 'error');
                    tbody.innerHTML = '<tr><td colspan="5" class="text-center">Unable to load students.</td></tr>';
                }
            } catch (error) {
                console.error('Load students error', error);
                showToast('An error occurred while loading students', 'error');
                tbody.innerHTML = '<tr><td colspan="5" class="text-center">An error occurred.</td></tr>';
            }
        }

        function renderStudentAttendance(data) {
            const tbody = document.getElementById('attendanceStudentBody');
            if (!data.length) {
                tbody.innerHTML = '<tr><td colspan="5" class="text-center">No students found for this class.</td></tr>';
                return;
            }
            tbody.innerHTML = data.map((student, index) => `
                <tr>
                    <td>${index + 1}</td>
                    <td>${student.user?.name || 'N/A'}</td>
                    <td>${student.rollNumber || 'N/A'}</td>
                    <td>
                        <select class="form-control" onchange="updateStatus('${student._id}', this.value)">
                            <option value="present" ${student.status === 'present' ? 'selected' : ''}>Present</option>
                            <option value="absent" ${student.status === 'absent' ? 'selected' : ''}>Absent</option>
                            <option value="late" ${student.status === 'late' ? 'selected' : ''}>Late</option>
                        </select>
                    </td>
                    <td><input type="text" class="form-control" id="remark-${student._id}" value="${student.remarks || ''}" placeholder="Remarks" onchange="updateRemarks('${student._id}', this.value)" /></td>
                </tr>
            `).join('');
        }

        function updateStatus(studentId, value) {
            attendanceStudents = attendanceStudents.map(student => student._id === studentId ? { ...student, status: value } : student);
        }

        function updateRemarks(studentId, value) {
            attendanceStudents = attendanceStudents.map(student => student._id === studentId ? { ...student, remarks: value } : student);
        }

        async function submitAttendance() {
            const classId = document.getElementById('attendanceClass').value;
            const subjectId = document.getElementById('attendanceSubject').value;
            const date = document.getElementById('attendanceDate').value;

            if (!classId || !subjectId || !date) {
                showToast('Please choose class, subject and date', 'error');
                return;
            }
            if (!attendanceStudents.length) {
                showToast('No students loaded for this class', 'error');
                return;
            }

            const attendanceData = attendanceStudents.map(student => ({
                studentId: student._id,
                status: student.status,
                remarks: student.remarks || ''
            }));

            try {
                const response = await api.post('/attendance', { attendanceData, classId, subjectId, date });
                if (response.success) {
                    showToast('Attendance recorded successfully', 'success');
                } else {
                    showToast(response.message || 'Unable to record attendance', 'error');
                }
            } catch (error) {
                console.error('Submit attendance error', error);
                showToast('An error occurred while submitting attendance', 'error');
            }
        }

        loadInitialAttendanceData();
    </script>
</body>
</html>
