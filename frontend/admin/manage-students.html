<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Manage Students | SMS</title>
  <link rel="stylesheet" href="../assets/css/style.css" />
</head>

<body>
  <div class="app-wrapper">
    <!-- Sidebar – identical to dashboard -->
    <aside class="sidebar">
      <div class="sidebar-logo">
        <div class="sidebar-logo-icon">S</div>
        <div class="sidebar-logo-text">SMS Platform <span>Admin Panel</span></div>
      </div>
      <nav class="sidebar-nav">
        <div class="nav-section-title">Main</div>
        <a href="dashboard.html" class="nav-link">
          <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
            <rect x="3" y="3" width="7" height="7" />
            <rect x="14" y="3" width="7" height="7" />
            <rect x="14" y="14" width="7" height="7" />
            <rect x="3" y="14" width="7" height="7" />
          </svg>
          Dashboard
        </a>
        <div class="nav-section-title">Management</div>
        <a href="manage-teachers.html" class="nav-link">
          <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
            <path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2" />
            <circle cx="9" cy="7" r="4" />
          </svg>
          Teachers
        </a>
        <a href="manage-classes.html" class="nav-link">
          <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
            <rect x="2" y="3" width="20" height="14" rx="2" />
            <path d="M8 21h8M12 17v4" />
          </svg>
          Classes
        </a>
        <a href="manage-subjects.html" class="nav-link">
          <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
            <path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20" />
            <path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z" />
          </svg>
          Subjects
        </a>
        <a href="manage-students.html" class="nav-link active">
          <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
            <path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2" />
            <circle cx="9" cy="7" r="4" />
            <path d="M23 21v-2a4 4 0 0 0-3-3.87" />
            <path d="M16 3.13a4 4 0 0 1 0 7.75" />
          </svg>
          Students
        </a>
        <a href="student-list.html" class="nav-link">
          <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
            <line x1="8" y1="6" x2="21" y2="6" />
            <line x1="8" y1="12" x2="21" y2="12" />
            <line x1="8" y1="18" x2="21" y2="18" />
            <line x1="3" y1="6" x2="3.01" y2="6" />
            <line x1="3" y1="12" x2="3.01" y2="12" />
            <line x1="3" y1="18" x2="3.01" y2="18" />
          </svg>
          Student Profiles
        </a>
        <div class="nav-section-title">Reports</div>
        <a href="../reports/monthly-report.html" class="nav-link">
          <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
            <line x1="18" y1="20" x2="18" y2="10" />
            <line x1="12" y1="20" x2="12" y2="4" />
            <line x1="6" y1="20" x2="6" y2="14" />
          </svg>
          Monthly Report
        </a>
      </nav>
      <div class="sidebar-footer">
        <div class="sidebar-user">
          <div class="sidebar-user-avatar" id="sidebar-avatar">A</div>
          <div class="sidebar-user-info">
            <div class="sidebar-user-name" id="sidebar-user-name">Admin</div>
            <div class="sidebar-user-role" id="sidebar-user-role">admin</div>
          </div>
          <button class="btn-logout" onclick="logout()" title="Logout">
            <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
              <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4" />
              <polyline points="16 17 21 12 16 7" />
              <line x1="21" y1="12" x2="9" y2="12" />
            </svg>
          </button>
        </div>
      </div>
    </aside>

    <!-- Main Content -->
    <div class="main-content">
      <header class="top-header">
        <div>
          <div class="header-title">Manage Students</div>
          <div class="header-subtitle">Add, update, and remove students</div>
        </div>
        <div class="header-actions">
          <button class="btn btn-primary btn-sm" onclick="openAddStudentModal()">
            <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24">
              <line x1="12" y1="5" x2="12" y2="19" />
              <line x1="5" y1="12" x2="19" y2="12" />
            </svg>
            Add Student
          </button>
        </div>
      </header>

      <div class="page-content">
        <div id="alertContainer"></div>

        <!-- Filters & Table Card -->
        <div class="card">
          <!-- Filter Bar -->
          <div style="display: flex; gap: 1rem; flex-wrap: wrap; margin-bottom: 1.5rem;">
            <div style="flex: 1; min-width: 200px;">
              <input type="text" id="searchInput" class="form-control" placeholder="Search students..."
                onkeyup="searchStudents()" />
            </div>
            <div style="flex: 1; min-width: 200px;">
              <select id="classFilter" class="form-control" onchange="filterStudents()">
                <option value="">All Classes</option>
              </select>
            </div>
          </div>

          <!-- Students Table -->
          <div class="table-wrapper">
            <table>
              <thead>
                <tr>
                  <th>Name</th>
                  <th>Roll Number</th>
                  <th>Class</th>
                  <th>Email</th>
                  <th>Phone</th>
                  <th>Actions</th>
                </tr>
              </thead>
              <tbody id="studentsTableBody">
                <tr>
                  <td colspan="6">
                    <div class="loading">Loading students...</div>
                  </td>
                </tr>
              </tbody>
            </table>
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- Add/Edit Student Modal -->
  <div class="modal-overlay" id="studentModal">
    <div class="modal" style="max-width: 600px;">
      <div class="modal-header">
        <h3 class="modal-title" id="studentModalTitle">Add New Student</h3>
        <button class="modal-close" onclick="closeStudentModal()">&times;</button>
      </div>
      <form id="studentForm">
        <input type="hidden" id="studentId" />

        <div class="form-row">
          <div class="form-group">
            <label class="form-label" for="studentName">Full Name</label>
            <input type="text" id="studentName" class="form-control" required />
          </div>
          <div class="form-group">
            <label class="form-label" for="studentEmail">Email</label>
            <input type="email" id="studentEmail" class="form-control" required />
          </div>
        </div>

        <div class="form-row" id="passwordGroup">
          <div class="form-group">
            <label class="form-label" for="studentPassword">Password</label>
            <input type="password" id="studentPassword" class="form-control" minlength="6"
              placeholder="Create password" />
          </div>
        </div>

        <div class="form-row">
          <div class="form-group">
            <label class="form-label" for="studentRoll">Roll Number</label>
            <input type="text" id="studentRoll" class="form-control" required />
          </div>
          <div class="form-group">
            <label class="form-label" for="studentClass">Class</label>
            <select id="studentClass" class="form-control" required>
              <option value="">Select Class</option>
            </select>
          </div>
        </div>

        <div class="form-row">
          <div class="form-group">
            <label class="form-label" for="studentPhone">Phone</label>
            <input type="tel" id="studentPhone" class="form-control" required />
          </div>
          <div class="form-group">
            <label class="form-label" for="studentParentName">Parent/Guardian Name</label>
            <input type="text" id="studentParentName" class="form-control" />
          </div>
        </div>

        <div class="form-group">
          <label class="form-label" for="studentAddress">Address</label>
          <textarea id="studentAddress" class="form-control" rows="3"></textarea>
        </div>

        <div class="form-row">
          <div class="form-group">
            <label class="form-label" for="studentParentPhone">Parent/Guardian Phone</label>
            <input type="tel" id="studentParentPhone" class="form-control" />
          </div>
          <div class="form-group">
            <label class="form-label" for="studentDob">Date of Birth</label>
            <input type="date" id="studentDob" class="form-control" />
          </div>
        </div>

        <div class="form-group">
          <label class="form-label" for="studentGender">Gender</label>
          <select id="studentGender" class="form-control">
            <option value="">Select Gender</option>
            <option value="Male">Male</option>
            <option value="Female">Female</option>
            <option value="Other">Other</option>
          </select>
        </div>

        <div class="modal-footer">
          <button type="button" class="btn btn-secondary" onclick="closeStudentModal()">Cancel</button>
          <button type="submit" class="btn btn-primary">
            <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24">
              <polyline points="20 6 9 17 4 12" />
            </svg>
            Save Student
          </button>
        </div>
      </form>
    </div>
  </div>

  <script src="../assets/js/api.js"></script>
  <script>
    // Consistent API reference
    const api = API;

    let students = [];
    let classes = [];

    // Populate sidebar user info
    (function () {
      const user = getUser();
      if (user) {
        document.getElementById('sidebar-user-name').textContent = user.name || 'Admin';
        document.getElementById('sidebar-user-role').textContent = user.role || 'admin';
        document.getElementById('sidebar-avatar').textContent = (user.name || 'A').charAt(0).toUpperCase();
      }
    })();

    async function loadStudents() {
      try {
        const [studentsRes, classesRes] = await Promise.all([
          api.getStudents(),
          api.getClasses()
        ]);

        if (studentsRes.success) {
          students = studentsRes.data;
          renderStudents(students);
        } else {
          showAlert('Failed to load students', 'danger', document.getElementById('alertContainer'));
        }

        if (classesRes.success) {
          classes = classesRes.data;
          renderClassFilter(classes);
          renderClassOptions(classes);
          if (!classes.length) {
            showAlert('No classes exist yet. Please create a class in "Manage Classes" before adding students.', 'warning', document.getElementById('alertContainer'));
          }
        }
      } catch (error) {
        console.error('Cannot load students', error);
        showAlert('Unable to load students', 'danger', document.getElementById('alertContainer'));
      }
    }

    function renderClassFilter(data) {
      const filter = document.getElementById('classFilter');
      filter.innerHTML = '<option value="">All Classes</option>' +
        data.map(cls => `<option value="${cls._id}">${cls.name}${cls.section ? ' ' + cls.section : ''}</option>`).join('');
    }

    function renderClassOptions(data) {
      const select = document.getElementById('studentClass');
      select.innerHTML = '<option value="">Select Class</option>' +
        data.map(cls => `<option value="${cls._id}">${cls.name}${cls.section ? ' ' + cls.section : ''}</option>`).join('');
    }

    function renderStudents(data) {
      const tbody = document.getElementById('studentsTableBody');
      if (!data.length) {
        tbody.innerHTML = '<tr><td colspan="6" class="table-empty">No students found.</td></tr>';
        return;
      }
      tbody.innerHTML = data.map(student => `
        <tr>
          <td>${student.user?.name || student.name || 'N/A'}</td>
          <td>${student.rollNumber || '-'}</td>
          <td>${student.class?.name || 'N/A'}</td>
          <td>${student.user?.email || student.email || 'N/A'}</td>
          <td>${student.parentPhone || '-'}</td>
          <td>
            <button class="btn btn-sm btn-secondary" onclick="editStudent('${student._id}')" title="Edit">
              <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>
            </button>
            <button class="btn btn-sm btn-danger" onclick="deleteStudent('${student._id}')" title="Delete">
              <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/></svg>
            </button>
          </td>
        </tr>
      `).join('');
    }

    function openAddStudentModal() {
      document.getElementById('studentModalTitle').textContent = 'Add New Student';
      document.getElementById('studentForm').reset();
      document.getElementById('studentId').value = '';
      document.getElementById('passwordGroup').style.display = 'block';
      document.getElementById('studentModal').classList.add('open');
    }

    function closeStudentModal() {
      document.getElementById('studentModal').classList.remove('open');
    }

    function editStudent(id) {
      const student = students.find(item => item._id === id);
      if (!student) return;

      document.getElementById('studentModalTitle').textContent = 'Edit Student';
      document.getElementById('studentId').value = student._id;
      document.getElementById('studentName').value = student.user?.name || student.name || '';
      document.getElementById('studentEmail').value = student.user?.email || student.email || '';
      document.getElementById('studentRoll').value = student.rollNumber || '';
      document.getElementById('studentClass').value = student.class?._id || '';
      document.getElementById('studentPhone').value = student.parentPhone || '';
      document.getElementById('studentAddress').value = student.address || '';
      document.getElementById('studentParentName').value = student.parentName || '';
      document.getElementById('studentParentPhone').value = student.parentPhone || '';
      document.getElementById('studentDob').value = student.dateOfBirth
        ? new Date(student.dateOfBirth).toISOString().split('T')[0]
        : '';
      document.getElementById('studentGender').value = student.gender || '';
      document.getElementById('passwordGroup').style.display = 'none';
      document.getElementById('studentModal').classList.add('open');
    }

    async function deleteStudent(id) {
      if (!confirm('Are you sure you want to delete this student?')) return;
      try {
        const response = await api.deleteStudent(id);
        if (response.success) {
          showAlert('Student deleted successfully', 'success', document.getElementById('alertContainer'));
          loadStudents();
        } else {
          showAlert(response.message || 'Unable to delete student', 'danger', document.getElementById('alertContainer'));
        }
      } catch (error) {
        console.error('Delete error', error);
        showAlert('An error occurred while deleting student', 'danger', document.getElementById('alertContainer'));
      }
    }

    function getFilteredStudents() {
      const searchTerm = document.getElementById('searchInput').value.toLowerCase();
      const classFilter = document.getElementById('classFilter').value;

      return students.filter(student => {
        const name = student.user?.name || student.name || '';
        const email = student.user?.email || student.email || '';
        const roll = student.rollNumber || '';

        const matchesSearch = [name, email, roll].some(value =>
          value && value.toLowerCase().includes(searchTerm)
        );
        const matchesClass = !classFilter || student.class?._id === classFilter;
        return matchesSearch && matchesClass;
      });
    }

    function searchStudents() {
      renderStudents(getFilteredStudents());
    }

    function filterStudents() {
      renderStudents(getFilteredStudents());
    }

    document.getElementById('studentForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const studentId = document.getElementById('studentId').value;
      const payload = {
        name: document.getElementById('studentName').value.trim(),
        email: document.getElementById('studentEmail').value.trim(),
        rollNumber: document.getElementById('studentRoll').value.trim(),
        classId: document.getElementById('studentClass').value,
        parentName: document.getElementById('studentParentName').value.trim(),
        parentPhone: document.getElementById('studentParentPhone').value.trim(),
        address: document.getElementById('studentAddress').value.trim(),
        dateOfBirth: document.getElementById('studentDob').value,
        gender: document.getElementById('studentGender').value
      };

      // Basic validation
      if (!payload.name || !payload.email || !payload.rollNumber || !payload.classId) {
        showAlert('Please fill all required fields', 'warning', document.getElementById('alertContainer'));
        return;
      }

      try {
        let response;
        if (studentId) {
          response = await api.updateStudent(studentId, payload);
        } else {
          payload.password = document.getElementById('studentPassword').value;
          if (!payload.password) {
            showAlert('Password is required for new students', 'warning', document.getElementById('alertContainer'));
            return;
          }
          response = await api.createStudent(payload);
        }

        if (response.success) {
          showAlert('Student saved successfully', 'success', document.getElementById('alertContainer'));
          closeStudentModal();
          loadStudents();
        } else {
          showAlert(response.message || 'Unable to save student', 'danger', document.getElementById('alertContainer'));
        }
      } catch (error) {
        console.error('Student save error', error);
        showAlert('An error occurred while saving student', 'danger', document.getElementById('alertContainer'));
      }
    });

    // Close modal when clicking outside
    document.getElementById('studentModal').addEventListener('click', function (e) {
      if (e.target === this) closeStudentModal();
    });

    // Initial load
    loadStudents();
  </script>
</body>

</html>
