<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Student Management System</title>
    <link rel="stylesheet" href="../assets/css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>
    <div class="auth-container">
        <div class="auth-card">
            <div style="text-align: center; margin-bottom: 2rem;">
                <i class="fas fa-graduation-cap" style="font-size: 3rem; color: var(--primary-color);"></i>
                <h2>Welcome Back!</h2>
                <p style="color: var(--gray-color);">Login to your account</p>
            </div>

            <form id="loginForm">
                <div class="form-group">
                    <label for="email">
                        <i class="fas fa-envelope"></i> Email Address
                    </label>
                    <input type="email" id="email" class="form-control" required 
                           placeholder="Enter your email">
                </div>

                <div class="form-group">
                    <label for="password">
                        <i class="fas fa-lock"></i> Password
                    </label>
                    <input type="password" id="password" class="form-control" required 
                           placeholder="Enter your password">
                </div>

                <div class="role-select" id="roleSelect">
                    <div class="role-option" data-role="student">
                        <i class="fas fa-user-graduate"></i>
                        Student
                    </div>
                    <div class="role-option" data-role="teacher">
                        <i class="fas fa-chalkboard-teacher"></i>
                        Teacher
                    </div>
                    <div class="role-option" data-role="admin">
                        <i class="fas fa-user-shield"></i>
                        Admin
                    </div>
                </div>

                <button type="submit" class="btn btn-primary" style="width: 100%;">
                    <i class="fas fa-sign-in-alt"></i> Login
                </button>
            </form>

            <div class="auth-link">
                <p>Don't have an account? <a href="../student/register.html">Register here</a></p>
            </div>
        </div>
    </div>

    <script src="../assets/js/api.js"></script>
    <script>
        // Role Selection
        let selectedRole = 'student';
        document.querySelectorAll('.role-option').forEach(option => {
            option.addEventListener('click', function() {
                document.querySelectorAll('.role-option').forEach(o => o.classList.remove('active'));
                this.classList.add('active');
                selectedRole = this.dataset.role;
            });
        });

        // Set default active role
        document.querySelector('[data-role="student"]').classList.add('active');

        // Login Form Submit
        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;

            try {
                const response = await fetch('http://localhost:5000/api/auth/login', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ email, password, role: selectedRole })
                });

                const data = await response.json();

                if (response.ok) {
                    localStorage.setItem('token', data.token);
                    localStorage.setItem('user', JSON.stringify(data.user));
                    showToast('Login successful!', 'success');

                    // Redirect based on role
                    setTimeout(() => {
                        const roleRoutes = {
                            admin: '../admin/dashboard.html',
                            teacher: '../teacher/dashboard.html',
                            student: '../student/dashboard.html'
                        };

                        const redirectUrl = roleRoutes[data.user.role] || '../index.html';
                        location.assign(redirectUrl);
                        }, 1000);
                } else {
                    showToast(data.message || 'Login failed!', 'error');
                }
            } catch (error) {
                console.error('Error:', error);
                showToast('An error occurred. Please try again.', 'error');
            }
        });
    </script>
</body>
</html>
