<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Student Management System</title>
    <link rel="stylesheet" href="../assets/css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>

<body>
    <div class="auth-container">
        <div class="auth-card">
            <div style="text-align: center; margin-bottom: 2rem;">
                <i class="fas fa-graduation-cap" style="font-size: 3rem; color: var(--primary-color);"></i>
                <h2>Welcome Back!</h2>
                <p style="color: var(--gray-color);">Login to your account</p>
            </div>

            <form id="loginForm">
                <!-- ... form fields unchanged ... -->
                <div class="form-group">
                    <label for="email"><i class="fas fa-envelope"></i> Email Address</label>
                    <input type="email" id="email" class="form-control" required placeholder="Enter your email">
                </div>
                <div class="form-group">
                    <label for="password"><i class="fas fa-lock"></i> Password</label>
                    <input type="password" id="password" class="form-control" required
                        placeholder="Enter your password">
                </div>

                <div class="role-select" id="roleSelect">
                    <div class="role-option active" data-role="student">
                        <i class="fas fa-user-graduate"></i>
                        <div>Student</div>
                    </div>
                    <div class="role-option" data-role="teacher">
                        <i class="fas fa-chalkboard-teacher"></i>
                        <div>Teacher</div>
                    </div>
                    <div class="role-option" data-role="admin">
                        <i class="fas fa-user-shield"></i>
                        <div>Admin</div>
                    </div>
                </div>

                <button type="submit" class="btn btn-primary" style="width: 100%;">
                    <i class="fas fa-sign-in-alt"></i> Login
                </button>
            </form>

            <div class="auth-link">
                <p>Don't have an account? <a href="../student/register.html">Register here</a></p>
            </div>
        </div>
    </div>

    <script src="../assets/js/api.js"></script>
    <script>
        // Role Selection (unchanged)
        let selectedRole = 'student';
        document.querySelectorAll('.role-option').forEach(option => {
            option.addEventListener('click', function () {
                document.querySelectorAll('.role-option').forEach(o => o.classList.remove('active'));
                this.classList.add('active');
                selectedRole = this.dataset.role;
            });
        });
        document.querySelector('[data-role="student"]').classList.add('active');

        // Login Form Submit
        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;

            try {
                // FIX: use relative URL (same origin as backend on port 8080)
                const response = await fetch('/api/auth/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, password, role: selectedRole })
                });

                const data = await response.json();

                if (response.ok) {
                    // FIX: use setAuth from api.js to store with correct keys (sms_token / sms_user)
                    setAuth(data.token, data.user);

                    // FIX: replaced undefined showToast with showAlert from api.js
                    showAlert('Login successful!', 'success');

                    setTimeout(() => {
                        const roleRoutes = {
                            admin: '/admin/dashboard.html',
                            teacher: '/teacher/dashboard.html',
                            student: '/student/dashboard.html'
                        };
                        location.assign(roleRoutes[data.user.role] || '/index.html');
                    }, 1000);
                } else {
                    showAlert(data.message || 'Login failed!', 'danger');
                }
            } catch (error) {
                console.error('Error:', error);
                showAlert('An error occurred. Please try again.', 'danger');
            }
        });
    </script>
</body>

</html>
